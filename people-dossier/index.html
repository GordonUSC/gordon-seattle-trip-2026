var DB={"people": [{"name": "Joe Heally", "status_now": "The marriage is stable, deeply enmeshed, and operationally fused: Joe still runs Bellamy Heally Inc invoicing (live Hasbro PO as of 7/8), GGP's money, and the household. The live thread is his July 5 solo-built retirement and debt roadmap (refinance ~$525K, card balances, Social Security and Roth modeling out to 2041) which he called 'overwhelming to say the least,' with a 7/20 meeting booked with a state health-insurance counseling nonprofit. The June Tasklet friction has settled into cooperation. The urgent wrinkle: Gordon is in NYC 7/16-23 and Seattle right after, so the roadmap conversation and the 7/20 meeting coverage must be handled before Thursday.", "trend": "steady", "trend_evidence": "~55k msgs/yr sustained on the home iMessage channel with near-zero fade; Joe still initiates ~1.8x more (5,976 of 8,904 msgs); entanglement deepening (July 5 retirement roadmap, joint 7/20 counseling meeting, ongoing GGP/Hasbro invoicing on 7/8).", "life_effect": "improving", "life_effect_why": "Joe is the load-bearing wall: finances, health logistics, GGP's books, the quiet daily 'love you' hum captured in 75 voicemails. Honestly though, the improvement runs on Joe over-functioning, and the July 5 'overwhelming' email is the first time he named the weight out loud. The relationship improves Gordon's life enormously; the only thing that could flip it is leaving that bid unanswered.", "best_channel": "In person at the kitchen table is the only right channel for the retirement conversation; for texts, his primary iMessage (chat 3, +18184727279) in Gordon's terse 3-7 word register, never 'Babe,' via the joe_safe_send flow. Slow replies are his design, not distance.", "next_steps": ["Before flying 7/16: sit down with Joe, have him walk through the whole roadmap, and Gordon personally books the Fidelity call (calendar invite sent while sitting together, not 'I'll get to it').", "Resolve 7/20 coverage now: Gordon is in NYC that day, so either move the health-insurance counseling meeting, join by video from NYC, or explicitly hand it to Joe with thanks, but decide it out loud.", "Permanently take one recurring lane off Joe's plate (e.g., the estimated-tax calendar or one invoicing relationship), a transfer, not a favor."], "projected_result": "Joe feels the July 5 email was received as a partnership bid, not a task list; the Fidelity call gets a date before Gordon leaves; Gordon departs for 12 days with the marriage topped up instead of on deferral.", "goal_levers": ["Presence-not-provision goals: a standing monthly 'walk me through what you carry' session, per the 818 analysis growth edge.", "Task-transfer milestones: each quarter Gordon permanently owns one more recurring admin lane.", "Ritual triggers Darby can automate: Feb 24 birthday (non-negotiable gift), May anniversary roses via West Hollywood Florist, gardenia-scented gifts, and curiosity about the recurring solo Portland trips.", "Retirement-plan checkpoints (Fidelity call, refinance decision, estate docs) as shared goals rather than Joe-owned homework."], "draft": "Joe, I read every page of what you built. You did that alone and you should not have had to. Before I fly Thursday, sit with me and walk me through all of it. I am booking the Fidelity call myself today. Love you 😍", "dossier_update": "## UPDATE 2026-07-10 (Chosen-Family Keeper)\n- Live priority: the 7/5 retirement/debt roadmap is still unanswered in kind. Gordon departs 7/16 for NYC then Seattle (back ~7/27), so the sit-down + Fidelity booking must happen before Thursday 7/16.\n- Conflict flagged: the 7/20 state health-insurance counseling meeting falls mid-NYC-week; coverage undecided as of today.\n- Tasklet friction (June) confirmed settled into cooperation: Joe executing invoice requests without pushback as of 7/8 (Hasbro PO thread with Eric Francksen + Casey Reed).\n- Read for the record: Joe's message-volume imbalance is channel-fit, not neglect (per 2026-05-03 analytics), but the 7/5 email is different in kind: it is the first named 'overwhelming.' Treat as the year's most important family thread.", "world": "Chosen Family", "agent": "The Chosen-Family Keeper"}, {"name": "Brennan Murphy", "status_now": "Fully settled father-son bond, both tracks humming: family (LYMI sign-offs, Gordon's full health transparency in May) and working (GGP informal Chief of Staff, Tasklet agents, banner and research support). He is in NYC for the whole World Cup and is Gordon's local host and co-conspirator for the July 16-23 week: Fanatics Fest Thursday, Hamilton plus Tiesto at Breakaway Friday, Zeds Dead for Foster's birthday Saturday, the Final at Red Lion Sunday. October is already anchored (NiteHarts SD 10/9-11, Pokemon Night Out 10/24, his first Alison Wonderland show with Gordon). Watch items: the '36 years to $1M' money impatience and Georgia, whom he loves and who also stresses him.", "trend": "rising", "trend_evidence": "Text volume normalized from the 2021-22 peak (~1,080 msgs through 7/8), but 2026 in-person density is the highest ever: brunch 7/2, the full NYC week, NiteHarts and Pokemon Night Out locked for October, plus the May health-disclosure email signed 'Dad,' the deepest trust artifact in the corpus.", "life_effect": "improving", "life_effect_why": "Brennan is Gordon's primary affirmation-giver ('you have MADE years of my life'), the person who narrates his own thriving back to his dad as a gift, and increasingly gives back concretely (banner design, research, Tasklet ops). The only cost is Gordon's residual 'missed years' guilt, which Brennan has already done the labor of correcting; closing that loop is on Gordon.", "best_channel": "iMessage (his 608 number) in the playful BrenBren register with LYMI sign-offs; he answers fast and matches energy. For anything emotional, in person this week beats everything.", "next_steps": ["Text him today as co-conspirator: Harrison gets pinged ~7/11 to lock the Zeds Dead backstage ey impatience ('36 years to $1M'), occasional low-mood dips (2021, 2022, Oct 2024), Georgia 'handle with care.'\n- Reminder locked: Brennan was NOT at EDC '26; Oct 24 Pokemon Night Out = his first Alison Wonderland show with Gordon. Never downgrade from son (hard rule).", "world": "Chosen Family", "agent": "The Chosen-Family Keeper"}, {"name": "Mason Bailey", "status_now": "Best-friend tier, unchanged and mutual: ~26,485 lifetime messages, near-perfect 50/50 initiation, 1,263 messages in 2026 through early July, plus Gordon's unprompted 'ten years' tribute email in January. Settled fact from Gordon 7/9: Mason is OUT of GGP entirely and now sells pergolas in San Dimas, which dissolves the old friend/employee tension and makes this a purely personal bond for the first time since 2019. He has Gordon-gifted Evanescence tickets for Kia Forum on 7/18, the same night Gordon is at Zeds Dead in Queens for Foster's birthday.", "trend": "steady", "trend_evidence": "2026 message pace matches 2025; EDC '26 rail moment (Mason wiping Gordon's joyful tears during Summertime Sadness x Sirens) is the year's emotional postcard; June 13 twin-birthday brunch and Gayming Awards crew all landed as planned. No cooling signals anywhere.", "life_effect": "improving", "life_effect_why": "This is the healthiest architecture in Gordon's whole network: balanced initiation, crude humor plus undefended love, shared rituals (EDC, dodgeball, horror, memes), and now zero structural work entanglement. It is the template relationship the BRIEF reciprocity work should copy from.", "best_channel": "iMessage (chat 10, +12177996188) with meme energy; Gordon-confirmed hard rule that any message to Mason can and should carry meme-flavor. Pre-show voicemails are their old ritual ('get in my voice').", "next_steps": ["Send a pre-trip best-friend check-in that hypes his Evanescence night (7/18) and asks genuinely how pergola life is treating him, the career change deserves airtime, not just jokes.", "After Gordon returns (~7/27), lock the Baileys night with Joe, Mason, and Myke that Gordon already declared he wants ('Mychal and Joe have not gotten enough time together yet').", "Nudge the Shambhala 2027 lock-in conversation with Mason, Drake, and Mel once VRBQ (8/15) planning starts."], "projected_result": "Mason feels seen in his post-GGP chapter (new job named without awkwardness), the two households get a couples-level anchor on the calendar, and the 2027 festival ritual starts forming before ticket pressure hits.", "goal_levers": ["Ritual anchors: EDC anniversary Sundays, twin birthday (June 13 with Makenna), dodgeball seasons, VRBQ, Shambhala 2027.", "The meme+horror channel: routing horror-event intel (Beyond Fest, Halloween Horror Nights) is cheap, targeted generosity.", "Post-GGP career support: pergola sales is new; Gordon can be curious and useful (referrals, celebrating wins) without any employer shadow now.", "Couple-unit weaving: use Mason as the natural bridge for the Myke+Joe time deficit."], "draft": "Maseface. NYC bound Thursday for Foster's 55th and the Final. Meanwhile YOU have Evanescence at the Forum on the 18th, scream Bring Me To Life once for me. Best friend check in while I pack: how are you, and how is the pergola empire treating you? Love you.", "dossier_update": "## UPDATE 2026-07-10 (Chosen-Family Keeper)\n- SETTLED (Gordon 7/9, authoritative): Mason is OUT of GGP, now selling pergolas in San Dimas. All prior 'friend/employee dual-role tension' framing is retired; this is a purely personal best-friendship now.\n- Timing note: Mason's Evanescence night at Kia Forum (7/18, tickets Gordon sent March 2025) is the same night as Foster's Zeds Dead birthday in Queens, a nice cross-country 'both my people at shows' beat worth a same-night text exchange.\n- Open intents carried forward: Baileys+Joe couples night after Gordon returns ~7/27; Shambhala 2027 gentle lock-in with Drake and Mel; keep meme register (hard rule).", "world": "Chosen Family", "agent": "The Chosen-Family Keeper"}, {"name": "Myke Bailey", "status_now": "Personally warm, professionally paused. Myke (Cushman & Wakefield Global Creative Manager, Mason's husband) spent 2019-2023 as GGP's uncredited creative director, then was cleanly descoped from GGP's May 2026-April 2027 plan by Gordon's own 5/12 instruction, historical credit stays, no new scope. The personal thread holds: EDC '26 rail crew (he drove from LA), dodgeball, Covina holidays, and 2026 texting has actually more than doubled 2025's pace (91 msgs by early July vs 74 all last year). The nine-year pattern persists: he initiates 3.7x more than Gordon and has never once been matched.", "trend": "steady", "trend_evidence": "2026 message rate is up (91 through 7/8 vs 74 in all of 2025) and he was on the EDC '26 rail, but the GGP scope removal (5/12) ended the professional axis and there is no documented conversation closing that loop with him directly.", "life_effect": "improving", "life_effect_why": "Honestly: Myke improves Gordon's life at almost no cost to Gordon, which is exactly the ledger problem. Years of professional-grade creative labor, relentless check-in energy, and family warmth flowed one way. Nothing suggests resentment, but this is the family relationship where Gordon is most clearly the under-investor, and one unexplained descope away from quiet hurt.", "best_channel": "iMessage (+13104993204) matching his effusive, emoji-forward register for warmth; the GGP scope conversation should be face to face (the planned Baileys night is the natural venue), never text.", "next_steps": ["Send one Gordon-initiated, zero-logistics, zero-ask appreciation text this week, the first deliberate act of matching his initiation energy.", "At the post-trip Baileys night, close the GGP loop in person: 'wanted you to hear the 26-27 shape from me,' framed with specific gratitude for the one-sheets, CYSTEM brand, and overlay years.", "Build the Myke+Joe friendship Gordon already flagged as underdevel he moment the maintenance load rebalances even slightly, and Gordon should carry it by choice, not by habit.", "best_channel": "iMessage (+1 713-302-9547) for real notes and calls; he answers there daily-ish, and the relationship's best recent moments (the proclamation exchange, storm check-in) all happened in text.", "next_steps": ["Send the proclamation-legacy note and propose one scheduled call; this is the single cheapest rebalance move, reviving their 2024 'Eric/Gordon Planning' format.", "Use World Cup summer: Houston is a host city; ask what the city feels like and whether a Houston match or watch party could double as the reunion.", "Consider GGP-to-Out-at-the-Rodeo cross-promo or Gordon attending March 2027; two LGBTQ+ institution-builders in the same niche should not be drifting on logistics."], "draft": "Hulsey. I keep coming back to what you built. Five years in and the City of Houston literally declared March 21 Out at the Rodeo Day. Three thousand people on Bluebonnet Hill. That is legacy work Eric, and I want to hear the parts that did not fit in a text. Can we put a real call on the calendar after my July travel gauntlet? Also I need to know what Houston feels like in a World Cup summer.", "projected_result": "Given his pattern (the 3/22 event question drew his longest, proudest reply of the era), expect a substantive response and a scheduled call, which converts the relationship's maintenance from Gordon's daily drip into a rhythm that can survive both their calendars.", "goal_levers": ["His builder legacy (Out at the Rodeo, Houston Gaymers): celebrating the work by name is the deepest key to him.", "USMNT/World Cup fandom with Houston as a host city: the live low-effort bridge to an in-person reunion.", "GGP x Out at the Rodeo institutional collaboration: turns friendship maintenance into shared mission, the mode where this tie originally caught fire."], "dossier_update": "## 2026-07-10 · Reconnection Scout update\n- SOLVED: the unnamed March 2026 g MSP invitation: next time routing passes through Minneapolis, build in a stop; he has asked twice."], "draft": "", "projected_result": "No message needed (healthy daily thread); the contact-card and dossier fix plus a future MSP stopover converts a fast-rising digital friendship into an in-person one.", "goal_levers": ["AI-agent shop talk (OpenClaw vs Hermes): the core shared project; demos and capability swaps deepen it naturally.", "MSP stopover: his repeated explicit invitation, the obvious next-level move.", "Shared humor channel (World Cup, memes): the daily glue; Gordon's broadcast jokes land reliably here, unlike with most ties."], "dossier_update": "## 2026-07-10 · Reconnection Scout update (NEW DOSSIER SEED)\n- Identity resolved: +1 314-313-6813 = Matt Kramer, Minneapolis/MSP-based (314 area code misleading; per don't-guess-city rule, residence evidenced by 'I'm in St. Louis' being said by a DIFFERENT contact; Kramer's own texts anchor MSP/Minnesota: Bloody Mary, 'coming through MSP again').\n- Arc: thread starts 2025-12-08 with mutual missed-call apologies; 1,132 msgs in 7 months, balanced, daily cadence, last touch 2026-07-08.\n- Texture: runs an AI agent system 'Hermes' ('like OpenClaw'); trades agent shop talk with Gordon about Darby/Mac Mini life; World Cup meme exchange.\n- Gaps to fill: pre-Dec-2025 origin (how they met), profession/employer, partner/family status. Do not infer any of these.\n- Action: contacts + dossier roster; plan an MSP stopover when routing allows (invited twice, 2026-07-08 most recently).", "world": "Rising & Reconnect", "agent": "The Reconnection & Rising-Ties Scout"}, {"name": "Debbi Yuen (+1 510-676-6767)", "status_now": "The one growing-list number that has gone quiet: 83 days since 2026-04-17, when Gordon's last message ('what was the name of that awesome korean bowl vendor?') went unanswered. She is a USC/Viterbi community connector and GGP-program participant (received GGP money plus a GDC pass and professional development in Jan 2026) whose thread is 94 percent inbound: she pours effort toward Gordon. Critically, in April she disclosed with real vulnerability that the Fall buildathon 'was quite stressful on me and brought on a financial cost to me,' making her wary of hosting events; Gordon Loved the messages and thanked her, but the record since is silence.", "trend": "cooling", "trend_evidence": "740 messages with 713 in 2025 collapsing to 18 in 2026; 83 days dark after an unanswered trivial question; her last substantive messages were the stress/financial-cost disclosure of 2026-04-13.", "life_effect": "neutral", "life_effect_why": "She costs Gordon almost nothing (he sends 6 percent of the thread) and gives generously: promotion, presence, community labor. The honest flag runs the other direction: this tie may be straining HER, and Gordon's values (dignity, generosity, never letting a student absorb costs for his ecosystem) mean the next move is stewardship, not extraction.", "best_channel": "iMessage (+1 510-676-6767) for the check-in; in-person at USC in the fall is where the relationship actually repairs.", "next_steps": ["Send the no-ask gratitude note now, explicitly acknowledging what she named in April; do not attach any request to it.", "Before fall semester, make sure any event she touches has a real budget line so she never personally absorbs costs again; that is the structural fix her disclosure was asking for.", "Add her to the fall USC social calendar (a meal, not a task)."], "draft": "Debbi! Zero asks in this message, only appreciation. I have been thinking about what you shared last spring about the buildathon taking a real toll on you, and I want you to know I heard it. You have given so much to this community and none of it is invisible to me. When school spins back up, lunch is on me and the only agenda is catching up. Also I still dream about that korean bowl.", "projected_result": "Given her warmth and responsiveness to being seen (she showed up to the April showcase despite her wariness), expect a touched, positive reply and a repaired footing before fall semester, with the relationship shifted from volunteer-labor mode to valued-person mode.", "goal_levers": ["Structural cost-protection: budgeted support for anything she organizes; the lever her own words identified.", "Public and private recognition of her Viterbi community work: she responds strongly to specific gratitude.", "Food-anchored one-on-one time (the korean bowl thread): the low-stakes personal channel this relationship has never fully used."], "dossier_update": "## 2026-07-10 · Reconnection Scout update\n- Number mapped: +1 510-676-6767 = Debbi Yuen (740 msgs, 96 percent inbound to Gordon; GGP program recipient Jan 2026: stipend + GDC pass + prof dev).\n- Care flag (important): 2026-04-13 disclosure that the Fall buildathon caused her stress and personal financial cost, making her wary of hosting; Gordon acknowledged warmly 4/14 but thread has been dark 83 days since his unanswered 4/17 food question.\n- Stewardship stance: she over-gives relative to what she receives; next moves must be asks-free (gratitude note delivered 2026-07-10) and structurally protective (budget lines for anything she organizes).\n- Fall play: one-on-one lunch at USC, recognition of her Viterbi connector role.", "world": "Rising & Reconnect", "agent": "The Reconnection & Rising-Ties Scout"}], "collective": {"reading": "Merged across all 9 desks, Gordon's 85-person portfolio is in remarkable health: 33 ties rising, 27 steady, and not a single relationship actively straining his life. The costs that exist are subtle and structural, not conflictual. Three collective truths emerge that no single agent fully owns. FIRST, Gordon is the initiation engine for most of his network (7 of 10 festival threads, 3:1 or worse ratios across the LA slice, a 4:1 tax with Hulsey and Jared), and the relationships that feel best to him are precisely the exceptions where someone else does the reaching (Andrew Myers, Sal, Will Schoettle, Antoine). The portfolio does not need new people; it needs anchors that convert Gordon's one-way fuel into scheduled reciprocity. SECOND, relationships in this network do not die, they migrate or fade mid-warmth: Hulsey moved rooms from iMessage to Instagram, Arrigo moved registers from daily bestie to fiduciary, and every dormant tie's last message was affection (Luca's love, Jessica's heart-eyes, Anthony's EDC invite). This means every save is cheap and every dated hook works, and Gordon already holds the hooks: NYC Jul 17-23, Seattle Jul 23-27, VRBQ Aug 15, Portola Sept 26-27, Shambhala 2027, EDC 2027. THIRD, July 2026 is the compression point of the whole year. Roughly half the portfolio converges on the Jul 16-29 fortnight: the Scholars Brunch, G4C, the World Cup final at MetLife, Foster's backstage surprise, Ceci, Antoine, Luca, the Delphi cluster, then Seattle for Dane's wedding, Morrow, and the WOTC days. The one person that fortnight structurally underserves is Joe, who on July 5 sent the most emotionally exposed document in nine years of data (his solo-built retirement roadmap) eleven days before Gordon leaves for 12 days of chosen-family celebration. The marriage is steady and improving, but it needs one deliberate act of presence before wheels-up on 7/16, and the corps is unanimous that this is the single most important move on the board. Underneath everything sits an unpaid-labor ledger (Joe on finances, Myke on nine years of creative direction, Eric/Alex/Mabel all at capacity carrying GGP) in currencies Gordon under-notices because they are not message-volume currencies. Finally, a program-level correction from the roots desk that the whole corps endorses: Gordon's oldest bonds run on voice and physical ritual, so message metrics structurally understate them, and Darby-voiced outreach actively fails there (four unanswered emails to Jordan Chaney). Old roots get Gordon's own thumbs and voice; Darby handles logistics only after the human channel is warm. Net verdict: this is a compounding, joy-generating network whose only real liabilities are Gordon's uninvoiced follow-ups to himself (Malaga contract unsigned, Daugaard's invitation uncaptured, DiGennaro's RSI invite aging five weeks) and the low-grade guilt debt of crisis-only and tapback-only threads.", "tensions": "The corps does not fully agree, and the disagreements are worth keeping. (1) Eric Hulsey is the sharpest split: the Festival Anthropologist reads him steady and improving (the friendship changed rooms, not temperature; he is Gordon's #1 Instagram engager, active daily), while the Reconnection Scout reads him cooling and neutral (an 80% volume collapse plus a 4:1 initiation tax Gordon is paying indefinitely without deciding to). The merged truth is that warmth is steady while structure is cooling, and the real question is whether Gordon consciously accepts the tax or converts it into one scheduled call. The count above records him as steady/improving, but the dossier should show both reads. (2) Initiation-engine framing: most desks treat Gordon-as-flywheel as generosity in action; the LA Concierge and Reconnection Scout name it as the portfolio's only genuine cost, a slow guilt debt and an asymmetry people like Will Schoettle have said out loud. Tradeoff: every new anchor Gordon creates is also new fuel he must supply unless reciprocity is designed in. (3) Darby-voiced vs Gordon-voiced: the Roots Historian demands a hard stop on Darby cadences for old-roots people (Jordan Chaney, Quinn, Steve Russell) because they only answer Gordon's actual voice, while other desks ship draft after draft for Gordon to fire. The reconciliation is a routing rule, not a winner: drafts for professional and event logistics, Gordon's own thumbs and voice for anyone who knew him before 2000. (4) NYC-week capacity: nearly every agent routes moves through Jul 17-23, and stacked together they would overload the week and dilute the very presence the Chosen-Family Keeper says Foster and Brennan deserve, right after a departure that already costs Joe. Something on the NYC list must consciously not happen; Hoagland and the Delphi innovation call can slide to the week of Jul 27 without loss. (5) Hold vs push on quiet mentees and friends: the Roots and Academy desks say do NOT ping Quinn or Nathalie again (silence is the move), while the overall program bias is proactive outreach; both are right about different people, and the dossier should mark holds as deliberate moves, not gaps. (6) Theresa Loong is simultaneously the best USC connector and the biggest ask-density risk; the Academy Dean says close open loops before opening new ones, while the Broker desk keeps opening high-upside new loops (Delphi, Blencowe, Huey). (7) Casey Reed: the Mission Strategist explicitly wants Gordon to hold and let Eric run the invoice lane, a rare recommendation of inaction that cuts against Gordon's instincts. (8) Zero ties are labeled straining, but three desks insist honest cost accounting still belongs in the picture: Joe's and Myke's unpaid-labor ledgers, the crisis-only pattern with Paul and Jeff Royle, and the over-functioning GGP trio one live deliverable away from re-testing the April Mabel-Eric rift.", "moves": ["Before wheels-up 7/16: sit down with Joe, have him walk Gordon through the entire retirement roadmap, and book the Fidelity call together on the spot (calendar invite sent while sitting side by side). Unanimous corps priority number one.", "Lock the Dane and Megan ceremony call before the 7/17 NYC departure: script walkthrough, rehearsal time, ceremony start time, and Leavenworth arrival logistics, so Gordon's first-ever officiant script is not finalized from a hotel between Tiesto and the Scholars Brunch.", "Confirm Theresa Loong's July 13 G4C deck date and ask to see the GGP/IIC framing before it uploads; pair it with a conscious GGP decision on the NEA Part 2 by July 21 instead of drifting into it.", "Ping Harrison on 7/11, exactly per his 'HMU closer to the date,' to lock the Zeds Dead backstage surprise for Foster, with Brennan recruited today as co-conspirator.", "Close the Jul 20 Scholars Brunch triangle in three messages: Mabel (confirm 7/20 vs the 7/19 calendar entry, ask what she needs, check her bandwidth honestly), Alex Rogers (close the guest list, the last blocker, plus one scholar story), and Joseph Kemp (confirm contact path and personally invite the Forbes 30 Under 30 proof point into the room).", "Load the NYC week before its social calendar locks: Ceci confirmation for Jul 17-19 with Brennan included, Antoine's Zeds Dead invite (he is Brooklyn and Deadbeats-signed), the Luca reopener, the Judah Silver GGP invite-list fix followed by his NYC note, and the Kleinman/Delphi text asking who is around the MetLife final.", "Send Mike Morrow the Seattle dinner invite now for Jul 23-27, the first in-person window since the friendship re-densified.", "Clear the expiring small sends in one sitting: Sal's belated birthday text (July 8 window still open), Laylah's World Cup bookend before the 7/19 final makes it old news, and Gordon's own SDCC Malaga contract signature with Vega."], "health": {"rising": 33, "steady": 27, "cooling": 15, "dormant": 10, "improving": 58, "straining": 0}}, "perspectives": [{"t": "The Chosen-Family Keeper", "p": "From the chosen-family slice, the single thing nobody else's beat will catch: July 2026 is a compression point where the family's two halves pull against each other. On July 5, Joe sent the most emotionally exposed document in nine years of data, a solo-built retirement and debt roadmap he called overwhelming. Eleven days later Gordon flies east for roughly 12 straight days of chosen-family celebration (NYC week with Brennan and Foster, then the Seattle wedding), leaving Joe home alone right after his biggest bid for partnership. The chosen family is thriving; the marriage needs one deliberate act of presence before wheels-up on 7/16. Second pattern only I see: the family's center of gravity is migrating away from LA. Brennan is Brooklyn, Foster is Manhattan, David and Trent just consolidated in San Francisco. What remains in LA is Joe plus the Bailey household, which means Gordon's home-base love is increasingly carried by fewer local people while his travel calendar serves the distant ones. Third: the family has an unpaid-labor ledger with two names on it, Joe (finances, caregiving) and Myke (nine years of creative direction, now quietly descoped from GGP with no documented close-the-loop conversation). Both over-give in currencies Gordon under-notices because they are not message-volume currencies. Fourth: Foster's son crisis (Aug 2025) and David's self-care pivot (Apr 2025) are the two vulnerability disclosures in this circle that got a react but no documented deep follow-up; the NYC week and the September SF trip are the natural windows to close each one in person, privately. Finally, the one hard-rule tripwire in this slice: Foster's Friday Brooklyn visits during the NYC week must never be referenced (Robbie Birch rule), and Georgia should be handled with warmth but zero invention, since she both anchors and stresses Brennan."}, {"t": "The Festival-World Anthropologist", "p": "From the festival-world slice, the single biggest pattern others will miss: these relationships do not fade, they MIGRATE. Eric Hulsey looked like an 80% collapse on iMessage until the Instagram export showed he is Gordon's #1 IG engager, active daily; the friendship changed rooms, not temperature. Adam Arrigo migrated registers (daily bestie to godfather-plus-board-fiduciary, fewer messages but heavier ones). Judah, Ari, and Wilson live entirely on Instagram, where Gordon's broadcast-attachment habit (same clip fanned to all three on the same dates: 1/7, 5/13, 6/19, 6/30) keeps threads alive but flat; the trio reciprocates with likes, not words, and the only way any of them deepens is a dated in-person anchor. Which is the second pattern: EVERY relationship in this slice that thrives has a calendar anchor (Shambhala for Kyle, HARD Summer for Andrew, Precinct Fridays for Sal, CTIN syllabus for Jeffrey, NYC July for Judah), and every one that is drifting lost its anchor. Gordon's July 17-23 NYC week, VRBQ Aug 15, and the just-announced Shambhala 2027 dates are the three highest-leverage anchors available right now, and almost every person in this slice maps onto one of them. Third: Gordon is the initiation engine in 7 of 10 threads (4:1 with Hulsey and Jared); the exceptions (Andrew, Sal, 2022-era Judah) are precisely the ones that feel best to him. The honest cost accounting is that Jared and Kyle run on Gordon's fuel; the honest asset accounting is that Judah Silver quietly became a Forbes 30 Under 30 UTA games agent closing deals for underestimated developers, i.e. a GGP-mission ally hiding in the likes column, and he flagged in February that he never got his GGP invite. That is a five-minute fix with outsized return."}, {"t": "The Mission Strategist (GGP)", "p": "From the GGP mission desk, the pattern nobody sees from a single channel: Gordon's nonprofit runs on exactly three over-functioning operators (Eric, Alex, Mabel) who each carry a different load while Gordon supplies doors, funding fights, and love. All three are simultaneously at or past capacity, and the April Mabel-Eric rift is the one structural crack in the org; the May decoupling fix is holding but untested under a live deliverable. Meanwhile the customer flywheel is quietly proving Gordon's whole theory: Casey Reed (dodgeball friend to Hasbro customer in five weeks) and Megan Marx (EA to WOTC's John Hight) show that friendship-precedes-contract is GGP's real business model. Joseph Kemp is the outcome story that pays for everything (first Scholar on Forbes 30 Under 30, and Disbarred actually shipped in December, so the proof point is now a shipped product, not a press release), yet nobody has confirmed his contact path or gotten him in a room. Stephen Machuga is the coalition edge: Stack Up just crossed 10 years and 60,000 veterans served but donations fell 20% in 2024, which means a GGP-Stack Up mutual-aid friendship costs Gordon nothing and means a lot right now. Selena Wagner is the anomaly: a genuinely good VA whose job increasingly overlaps with Darby and who still holds plaintext passwords sent over iMessage. The hinge for my entire slice is the July 17-29 fortnight: NYC brunch (Jul 20, and the calendar shows the invite pinned to 7/19 vs the confirmed Monday 7/20, worth one verify text to Mabel), G4C on 7/21, then Seattle for the wedding and WOTC days. Nearly every relationship I cover converges on those twelve days, and what Gordon does in them sets up GGP Honors in November."}, {"t": "The Games-Industry Broker", "p": "From the games-industry broker seat, four things stand out that the other slices would miss. First, Gordon under-invoices himself in his own brokerage flywheel: he powers Ivan Lobo's entire US pipeline (Capcom, Skybound, Bethesda, WBD) yet his own SDCC Malaga participation contract, sent June 1, still shows no confirmed signature, and Casper Daugaard's explicit repeated invitation to talk Delphi innovation (June 18) has sat uncaptured for three weeks. Gordon collects joy and status from these intros but rarely closes his own loops. Second, the Delphi cluster (Kleinman, Daugaard, Tang-Peronard, Merceron, plus Blencowe in the same box) is the highest-upside new node of 2026: a publisher sitting at the Hollywood IP x FIFA x Netflix convergence, with the World Cup final on July 19 as a natural, expiring re-engagement window that overlaps Gordon's NYC week (Jul 17-23). Third, his conference-cadence friendships (DeLoura, Satvat) run hot at summits and go quiet between them; DeLoura has twice not had Gordon saved in his phone. One cheap mid-cycle personal ping per relationship converts event acquaintanceship into continuity, and Gordon is the only one who will send it. Fourth, a data-hygiene warning for the whole program: the voicemails bucketed under Mark DeLoura are actually Ted Collings plus spam, so raw channel volume must be identity-verified before anyone trusts it. Net read: Gordon's industry graph is compounding fast, but almost every open item this cycle is a follow-up he owes, not one he is owed, except Hoagland, where the ball is technically hers and the NYC trip gives him a graceful reason to pick it up anyway."}, {"t": "The Academy & Mentorship Dean", "p": "From the Academy and Mentorship desk, the pattern nobody else sees: Gordon's institutional USC lines (Holly, Kenneth, Kristin, April and Hugo) are all warm but idle, coasting on spring goodwill, while the one academy-adjacent thread that is actually surging is Theresa Loong, who is simultaneously his best USC-president connector AND his biggest ask-density risk, with a G4C deck due July 13 and an NEA Part 2 decision due July 21 that GGP has not consciously decided on. Meanwhile his two mentees are mirror images: Antoine only ever initiates (4 to 1 imbalance) and Gordon never does, and Nathalie has gone quiet under too many pings. The NYC week of July 17 to 23 is the single highest-leverage window on my whole slice: Antoine lives in Brooklyn, is signed to Zeds Dead's label, and Gordon is literally attending a Zeds Dead show. And the Joann DiGennaro RSI lecture invite has now sat unanswered for over five weeks; it is a prestige platform aimed straight at Gordon's own origin story and it will quietly expire if he does not answer before the summer program ends. My slice says: close the open loops before creating new ones, and let Gordon initiate for once with the people he mentors."}, {"t": "The Weddings & Winnipeg Chronicler", "p": "My slice is Gordon's festival-to-family conversion engine at its ceremonial peak. Two weddings in one summer, both grooms met as strangers at festivals, and Gordon holds a formal role at each. What others would miss: (1) The real deadline for Dane's ceremony is July 17, not July 25. Gordon flies to NYC on the 17th and lands in Seattle the morning of the 23rd, so the script, rehearsal time, and run-of-show must be locked in the next seven days or he will be finalizing his first-ever officiant script from a hotel between Tiesto and the Scholars Brunch. (2) There is a post-July 25 vacuum coming. Both wedding arcs close within eight weeks of each other, and wedding planning has been the connective tissue generating most of the 2026 message traffic with Dane, Megan, Drake, and Mel. The multi-year volume decline with Drake (708 to 163) shows what happens when no ritual anchor replaces the planning traffic. Sam-bhala 2027 is the obvious replacement anchor and should be converted from joke to commitment in August. (3) The poetic symmetry nobody has said out loud: on July 25, Drake and Mel will be at Shambhala (they never miss, July 24-27) while Gordon marries off the OTHER Shambhala evangelist. A single photo exchange between Fractal Forest and Leavenworth that day would fuse the two halves of this world. (4) Laylah is the one fragile thread. The World Cup created the bond, Portugal is out (July 6, Ronaldo's last match), her last inbound was June 17, and without a bookend message the relationship dies with the event. (5) Mel is quietly becoming the most responsive person in this whole cluster, and her AI curiosity gives Gordon a channel that will outlive any festival."}, {"t": "The Roots Historian (school + bio family)", "p": "From the roots slice (school plus bio family), the thing the other eight analysts will miss is that Gordon's oldest bonds run on VOICE and physical ritual, not text, so every message-volume metric structurally understates them. Walt Zink (40 years, St. Paul's, 1986 Logan Airport ride) does his real relationship work in long phone counsel sessions and 9 loving voicemails; Werten Jr leaves 5-second brotherly voicemails and then calls back. The single most emotionally significant event anywhere in this slice right now is the sale of 2635 Fox Mill Road, the childhood home: Werten Jr is mailing Gordon a box of scrapbooks THIS WEEK (address sent 7/7), and Gordon has already voiced a legacy plan (Strong Museum of Play donation, game-design papers, math journey artifacts). That box arriving is a scheduled emotional moment nobody is preparing for. Second pattern: the 2026 World Cup quietly functioned as a family and roots reunification engine. It re-lit Quinn (SoFi visit, ticket gift), re-lit Werten Jr (\"Brothers sharing World Cup Memories\"), gave Mike Morrow a 32-years-after-the-1994-draw callback, and gave Gordon shared language with Ketchum and Werten III. The tournament ends July 19; these threads need a new carrier signal after the final, and the roots slice already has them queued: Seattle Jul 23-27 (Morrow), the scrapbook box (Werten Jr), Erica's Northwestern start (fall), Gryphus 2027 dates already confirmed (Walt). Third: the validator gap is real and school-specific. Jordan Chaney has now received FOUR Darby-voiced emails (6/17, 6/20, 6/23, 6/25) with zero replies; Quinn ignored Darby's first outreaches too and only re-engaged through Gordon's own thread. Old-roots people respond to Gordon's actual voice and number, not to AI-mediated mail. Recommendation for Darby's operating posture on this slice: stop email cadences, put Gordon's own thumbs and voice on these channels, and reserve Darby for logistics once the human channel is warm."}, {"t": "The LA-Life Concierge", "p": "From the LA-life slice, the single loudest pattern is that Gordon is the initiation engine for almost this entire layer of his life: Tony (3:1), Elrod (300 vs 178), Angela (61% of messages), Paul, Rich. The two exceptions are instructive: Will Schoettle out-initiates Gordon 2.6:1 and has named the imbalance out loud, and Cale Yarborough is the one LA-orbit friendship that compounded because Gordon converted access into structure (EDC crew, Karst Hill, then Gryphus EP). What others would miss: 2026 is quietly becoming a tapback year on this slice. James, Will, and Rich have all drifted into Loved-reaction maintenance mode while the calendar itself is the untapped machine. Seattle Jul 23-27 reactivates Alex Garcia, VRBQ Aug 15 can absorb Will and the Marias, Wobbleland Aug 21-22 is a pre-built Elrod moment, Portola SF is a pre-built Birkhold moment, EDC Orlando is the Paul ember, and Miami Music Week Jan 2027 is a standing Sam invitation that just needs a date locked. Gordon does not need new relationships here, he needs to route existing events at dormant people. Second, honest signal: the crisis-only pattern (Paul, and to a degree Jeff Royle's unanswered love-bomb voicemails) is the one place this slice mildly costs Gordon, in low-grade guilt debt rather than conflict. Third: two brand-new mentorship threads (Brian Lopez, Angie) plus the neighbors are the cheapest joy-per-message investments on the whole map and align exactly with his generosity value."}, {"t": "The Reconnection & Rising-Ties Scout", "p": "I watch the edges of Gordon's network: the ties that are fading, the ties that are quietly becoming load-bearing, and the numbers nobody has named yet. Three things my slice shows that others would miss. First, Gordon's dormant ties never die in conflict; they fade mid-warmth (Luca's last words were love, Jessica's was a heart-eyes emoji, Anthony's was a birthday wish plus an EDC invitation). That means every save on my list is cheap: one specific, dated hook reopens each one, and Gordon already holds the hooks (NYC Jul 17-23 for Luca, EDC '27 W2 VIP for Anthony, VRBQ Aug 15 for Jessica). Second, the six 'unknown' growing phone numbers in the 818 list are all real, identifiable people, and two are brand-new load-bearing ties that deserve contact cards and dossiers: +16472679077 is John Shehan, WOTC digital-games PM in Seattle (Toronto area code, Seattle body; the don't-guess-city rule proved out), the exact bridge for the Jul 23-27 WOTC trip and the GGP/USC digital-games goal; +13143136813 is Matt Kramer, Minneapolis, Gordon's daily AI-agent peer (OpenClaw/Hermes talk). The other four are already-known people whose numbers just are not labeled in the export: Theresa Loong (+17184964964), Debbi Yuen (+15106766767), John Cawley (+16075925343), Jeremy Crawford (+12067551499). Third, Eric Hulsey is the case study in what 'cooling' actually means for Gordon: volume collapsed 80 percent but warmth did not; the risk is not loss, it is that Gordon keeps paying a 4:1 initiation tax indefinitely without deciding on purpose to do so. My honest read across the slice: none of these ties are straining Gordon's life; the only cost pattern is that Gordon is the flywheel for nearly all of them, so the levers I give Darby are mostly about converting Gordon's one-way broadcasts into scheduled, reciprocal moments tied to events already on his calendar."}]};
var P=DB.people;
document.getElementById('tt').onclick=function(){var r=document.documentElement;var c=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',c==='dark'?'light':'dark');};
function slug(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'-');}
P.forEach(function(p){p.slug=slug(p.name);});
var FILT={world:'',trend:''};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function badge(t,cls){return '<span class="badge b-'+cls+'">'+t+'</span>';}
function goals(){try{return JSON.parse(localStorage.getItem('pb_goals')||'{}');}catch(e){return {};}}
function saveGoals(g){localStorage.setItem('pb_goals',JSON.stringify(g));}

function renderIndex(){
 var q=(document.getElementById('q').value||'').toLowerCase();
 var worlds=[...new Set(P.map(function(p){return p.world;}))];
 var h='<h1>The People Book</h1><div class="sub">Your whole network, deep-updated by the nine-agent corps. Tap anyone. Set a goal on anyone.</div>';
 var g=DB.collective.health;
 h+='<div class="healthbar">'+
  '<div class="hstat"><div class="v" style="color:var(--rising)">'+g.rising+'</div><div class="l">rising</div></div>'+
  '<div class="hstat"><div class="v" style="color:var(--steady)">'+g.steady+'</div><div class="l">steady</div></div>'+
  '<div class="hstat"><div class="v" style="color:var(--cooling)">'+g.cooling+'</div><div class="l">cooling</div></div>'+
  '<div class="hstat"><div class="v" style="color:var(--dormant)">'+g.dormant+'</div><div class="l">dormant</div></div>'+
  '<div class="hstat"><div class="v" style="color:var(--improving)">'+g.improving+'</div><div class="l">improving your life</div></div>'+
  '<div class="hstat"><div class="v" style="color:var(--straining)">'+g.straining+'</div><div class="l">straining it</div></div></div>';
 h+='<div class="navrow"><span class="navbtn" onclick="location.hash=\'#collective\'">The Collective Read</span><span class="navbtn" onclick="location.hash=\'#shortlist\'">Reactivation Shortlist</span><span class="navbtn" onclick="location.hash=\'#moves\'">Top Moves This Week</span><span class="navbtn" onclick="location.hash=\'#mygoals\'">My Goals</span></div>';
 h+='<div class="navrow">'+worlds.map(function(w){return '<span class="navbtn'+(FILT.world===w?' on':'')+'" onclick="FILT.world=FILT.world===\''+w+'\'?\'\':\''+w+'\';render()">'+w+'</span>';}).join('')+'</div>';
 h+='<div class="navrow">'+['rising','steady','cooling','dormant'].map(function(t){return '<span class="navbtn'+(FILT.trend===t?' on':'')+'" onclick="FILT.trend=FILT.trend===\''+t+'\'?\'\':\''+t+'\';render()">'+t+'</span>';}).join('')+'</div>';
 var list=P.filter(function(p){
  if(FILT.world&&p.world!==FILT.world)return false;
  if(FILT.trend&&p.trend!==FILT.trend)return false;
  if(q&&(p.name+' '+p.world+' '+p.status_now+' '+p.trend_evidence).toLowerCase().indexOf(q)<0)return false;
  return true;});
 h+='<div class="grid">'+list.map(function(p){
  return '<div class="pcard '+p.trend+'" onclick="location.hash=\'#p/'+p.slug+'\'"><div class="nm">'+esc(p.name)+'</div><div class="wl">'+esc(p.world)+'</div><div class="badges">'+badge(p.trend,p.trend)+badge(p.life_effect,p.life_effect)+'</div></div>';
 }).join('')+'</div>';
 return h;
}
function personPlan(p,goal){
 var cad={rising:'Ride the momentum: one touch a week for the next month.',steady:'Keep the hum: a real touch every two weeks.',cooling:'Reconnect within 7 days, then a monthly rhythm until it warms.',dormant:'One no-apology opener (one shared memory, one real question), then patience.'}[p.trend];
 var steps=[];
 steps.push(['Channel','Use '+p.best_channel]);
 if(p.next_steps[0])steps.push(['This week',p.next_steps[0]]);
 p.goal_levers.slice(0,3).forEach(function(l,i){steps.push(['Lever '+(i+1),l]);});
 steps.push(['Cadence',cad]);
 steps.push(['Milestone',p.projected_result]);
 steps.push(['Darby','Tell Darby this goal out loud and I will run the campaign: drafts, timing, reminders, and progress tracking.']);
 return steps;
}
function renderPerson(sl){
 var p=P.find(function(x){return x.slug===sl;}); if(!p)return '<p>Not found.</p>';
 var g=goals()[p.slug];
 var h='<span class="back" onclick="history.back()">&larr; back</span>';
 h+='<h1>'+esc(p.name)+'</h1><div class="badges" style="margin-top:4px">'+badge(p.world,'world')+badge(p.trend,p.trend)+badge(p.life_effect+' your life',p.life_effect)+'</div>';
 h+='<div class="supers">'+
  '<div class="super"><div class="v">'+p.trend.toUpperCase()+'</div><div class="l">trajectory</div></div>'+
  '<div class="super"><div class="v">'+p.life_effect.toUpperCase()+'</div><div class="l">life effect</div></div>'+
  '<div class="super"><div class="v">'+esc((p.best_channel||'').split(/[,;(]/)[0].trim().slice(0,26))+'</div><div class="l">best channel</div></div></div>';
 h+='<div class="stem"><div class="lbl">Who they are right now</div><div>'+esc(p.status_now)+'</div>'+
  '<div class="lbl">The trend, with evidence</div><div>'+esc(p.trend_evidence)+'</div>'+
  '<div class="lbl">Honest life-effect read</div><div>'+esc(p.life_effect_why)+'</div>'+
  '<div class="lbl">How to reach them</div><div>'+esc(p.best_channel)+'</div></div>';
 h+='<h2>Next Steps</h2><div class="steps">'+p.next_steps.map(function(s,i){return '<div class="step"><span class="k">'+(i+1)+'</span><span>'+esc(s)+'</span></div>';}).join('')+'</div>';
 if(p.draft&&p.draft.trim()){h+='<h2>Ready Draft</h2><div class="draftbox" id="draft">'+esc(p.draft)+'</div><button class="copy" onclick="navigator.clipboard.writeText(document.getElementById(\'draft\').textContent).then(function(){event.target.textContent=\'copied ✓\';})">copy draft</button>';}
 h+='<div class="proj">If it works: '+esc(p.projected_result)+'</div>';
 h+='<h2>Set a Goal</h2><div class="goalbox"><div class="sub" style="margin-bottom:8px">What do you want with '+esc(p.name.split(' ')[0])+'? Type it, and get a plan built from their levers.</div>'+
  '<textarea id="goalin" placeholder="e.g. See them in person this quarter. Repair the drift. Bring them into GGP...">'+(g?esc(g.goal):'')+'</textarea>'+
  '<button class="goalbtn" onclick="makePlan(\''+p.slug+'\')">Build the plan</button><div class="plan" id="plan">'+(g?planHTML(p):'')+'</div></div>';
 h+='<div class="note">Levers on file: '+p.goal_levers.map(esc).join(' · ')+'</div>';
 return h;
}
function planHTML(p){var steps=personPlan(p);return steps.map(function(s){return '<div class="pl"><span class="ph">'+s[0]+'</span><span>'+esc(s[1])+'</span></div>';}).join('');}
function makePlan(sl){var p=P.find(function(x){return x.slug===sl;});var v=document.getElementById('goalin').value.trim();if(!v)return;
 var g=goals();g[sl]={goal:v,when:new Date().toISOString().slice(0,10),name:p.name};saveGoals(g);
 document.getElementById('plan').innerHTML='<div class="pl"><span class="ph">Your goal</span><span><b>'+esc(v)+'</b></span></div>'+planHTML(p);}
function renderCollective(){
 var h='<span class="back" onclick="history.back()">&larr; back</span><h1>The Collective Read</h1>';
 h+='<div class="stem"><div>'+esc(DB.collective.reading)+'</div><div class="lbl">Where the nine agents disagree</div><div>'+esc(DB.collective.tensions)+'</div></div>';
 h+='<h2>The Nine Perspectives</h2>'+DB.perspectives.map(function(x){return '<div class="persp"><div class="t">'+esc(x.t)+'</div><div class="p">'+esc(x.p)+'</div></div>';}).join('');
 return h;
}
function renderMoves(){
 return '<span class="back" onclick="history.back()">&larr; back</span><h1>Top Moves This Week</h1>'+DB.collective.moves.map(function(m,i){return '<div class="move"><span class="n">'+(i+1)+'</span><span>'+esc(m)+'</span></div>';}).join('');
}
function renderShortlist(){
 var list=P.filter(function(p){return p.trend==='cooling'||p.trend==='dormant';});
 list.sort(function(a,b){return (a.trend==='cooling'?0:1)-(b.trend==='cooling'?0:1);});
 return '<span class="back" onclick="history.back()">&larr; back</span><h1>Reactivation Shortlist</h1><div class="sub">Warm-but-quiet people, ranked. One message reopens any of these doors.</div><div class="grid">'+list.map(function(p){return '<div class="pcard '+p.trend+'" onclick="location.hash=\'#p/'+p.slug+'\'"><div class="nm">'+esc(p.name)+'</div><div class="wl">'+esc(p.world)+'</div><div class="badges">'+badge(p.trend,p.trend)+(p.draft&&p.draft.trim()?badge('draft ready','improving'):'')+'</div></div>';}).join('')+'</div>';
}
function renderMyGoals(){
 var g=goals();var ks=Object.keys(g);
 var h='<span class="back" onclick="history.back()">&larr; back</span><h1>My Goals</h1>';
 if(!ks.length)return h+'<div class="sub">No goals yet. Open any person and set one.</div>';
 return h+ks.map(function(k){return '<div class="savedgoal" onclick="location.hash=\'#p/'+k+'\'"><b>'+esc(g[k].name)+'</b> · '+esc(g[k].goal)+' <span style="color:var(--faint)">('+g[k].when+')</span></div>';}).join('');
}
function render(){
 var h=location.hash;
 var app=document.getElementById('app');
 if(h.indexOf('#p/')===0)app.innerHTML=renderPerson(h.slice(3));
 else if(h==='#collective')app.innerHTML=renderCollective();
 else if(h==='#moves')app.innerHTML=renderMoves();
 else if(h==='#shortlist')app.innerHTML=renderShortlist();
 else if(h==='#mygoals')app.innerHTML=renderMyGoals();
 else app.innerHTML=renderIndex();
 window.scrollTo(0,0);
}
addEventListener('hashchange',render);
document.getElementById('q').addEventListener('input',function(){if(!location.hash)render();else{location.hash='';}});
render();
</script></body></html>
